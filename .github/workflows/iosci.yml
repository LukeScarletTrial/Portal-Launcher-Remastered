name: iOS CI

on: [push, workflow_dispatch]

jobs:
  build:
    name: iOS CI
    strategy:
      matrix:
        include:
          - platform: 2
            platform_name: ios

    runs-on: macos-14
    steps:
      - name: Remove work folders
        run: |
          rm -rf ./* || true
          rm -rf ./.??* || true
          
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Checkout repository submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          brew install gpatch
          brew install make
          brew install --cask zulu@8
          export JAVA_HOME=`/usr/libexec/java_home -v 1.8`
          brew install ldid

      - name: Patch files
        run: |
          gpatch ./Amethyst-iOS/Natives/MinecraftResourceDownloadTask.m MinecraftResourceDownloadTask.patch
          gpatch ./Amethyst-iOS/Natives/JavaLauncher.m JavaLauncher.patch
          gpatch ./Amethyst-iOS/Natives/CMakeLists.txt CMakeLists.patch

      - name: Portal Branding & UI Injection
        run: |
          # Define paths
          PLIST_PATH="./Amethyst-iOS/Natives/Info.plist"
          LMV_PATH="./Amethyst-iOS/Natives/LauncherMenuViewController.m"
          MAKE_PATH="./Amethyst-iOS/Makefile"
          PROJECT_DIR="./Amethyst-iOS/Natives/AngelAuraAmethyst.xcodeproj"
          PBX_PATH="./Amethyst-iOS/Natives/AngelAuraAmethyst.xcodeproj/project.pbxproj"

          # 1. Update the Makefile (Crucial for ldid and folder paths)
          if [ -f "$MAKE_PATH" ]; then
            sed -i '' 's/AngelAuraAmethyst/AngelAuraPortal/g' "$MAKE_PATH"
            sed -i '' 's/org.angelauramc.amethyst/com.portalmc.portal/g' "$MAKE_PATH"
            echo "✅ Makefile Re-aligned"
          fi

          # 2. Update the Xcode Project File Internal References
          if [ -f "$PBX_PATH" ]; then
            sed -i '' 's/AngelAuraAmethyst/AngelAuraPortal/g' "$PBX_PATH"
            echo "✅ Project File Internal Re-aligned"
          fi

          # 3. Rename the Project Folder on Disk so Makefile finds it
          if [ -d "$PROJECT_DIR" ]; then
            mv "$PROJECT_DIR" "./Amethyst-iOS/Natives/AngelAuraPortal.xcodeproj"
            echo "✅ Project Folder Renamed"
          fi

          # 4. Update Info.plist
          if [ -f "$PLIST_PATH" ]; then
            sed -i '' 's/Amethyst/Portal/g' "$PLIST_PATH"
            sed -i '' 's/AngelAuraAmethyst/AngelAuraPortal/g' "$PLIST_PATH"
            sed -i '' 's/org.angelauramc.amethyst/com.portalmc.portal/g' "$PLIST_PATH"
            echo "✅ Info.plist Re-aligned"
          fi
          
          # 5. Inject Portal Library Button into UI
          if [ -f "$LMV_PATH" ]; then
            sed -i '' '/LauncherPreferencesViewController.class/a \
            [LauncherMenuCustomItem vcClass:LauncherNewsViewController.class],' "$LMV_PATH"
            sed -i '' 's/Amethyst/Portal/g' "$LMV_PATH"
            echo "✅ UI Injected"
          fi
          
      - name: Build for ${{ matrix.platform_name }}
        run: |
          cd Amethyst-iOS
          export PATH=/opt/homebrew/bin:$PATH
          export SLIMMED=1
          if [ "${{ matrix.platform_name }}" == "ios" ]; then
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} BRANCH=main VERBOSE=1
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1 BRANCH=main VERBOSE=1
          fi

      - name: Upload Portal IPA
        uses: actions/upload-artifact@main
        with:
          name: PortalMC-${{ matrix.platform_name }}.ipa
          path: Amethyst-iOS/artifacts/*.ipa

      - name: Upload Portal TrollStore TIPA
        uses: actions/upload-artifact@main
        with:
          name: PortalMC-${{ matrix.platform_name }}-trollstore.tipa
          path: Amethyst-iOS/artifacts/*.tipa
