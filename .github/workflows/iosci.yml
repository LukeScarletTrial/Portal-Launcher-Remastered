name: iOS CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: iOS CI
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - platform: 2
            platform_name: ios

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          brew install gpatch make ldid
          brew install --cask zulu@8
          echo "JAVA_HOME=$(/usr/libexec/java_home -v 1.8)" >> $GITHUB_ENV

      - name: Portal Component & Global Symbol Injection
        run: |
          # Paths
          PLIST="./Amethyst-iOS/Natives/Info.plist"
          LMV="./Amethyst-iOS/Natives/LauncherMenuViewController.m"
          CMAKE="./Amethyst-iOS/Natives/CMakeLists.txt"
          JAVA="./Amethyst-iOS/Natives/JavaLauncher.m"

          # 1. Repair JavaLauncher headers (Mach fix)
          if [ -f "$JAVA" ]; then
            printf '#import <mach/mach.h>\n#import <mach/task.h>\n' > head.tmp
            cat head.tmp "$JAVA" > "$JAVA.new" && mv "$JAVA.new" "$JAVA"
          fi

          # 2. THE ULTIMATE LINKER FIX: Define symbol via CMake
          # This forces the linker to define __UISolariumEnabled as a 0 (false) globally
          if [ -f "$CMAKE" ]; then
            sed -i '' 's/target_link_libraries/add_definitions("-D__UISolariumEnabled=0")\ntarget_link_libraries/g' "$CMAKE"
            echo "set(CMAKE_EXE_LINKER_FLAGS \"${CMAKE_EXE_LINKER_FLAGS} -Wl,-alias,_main,_main -Wl,-U,__UISolariumEnabled\")" >> "$CMAKE"
            echo "✅ Injected Linker Override into CMake"
          fi

          # 3. Inject PortalLibrary.m
          cp PortalLibrary.m ./Amethyst-iOS/Natives/PortalLibrary.m
          
          # 4. Rebrand & Bypass JIT
          sed -i '' 's/org.angelauramc.amethyst/com.portalmc.portal/g' "$PLIST"
          sed -i '' '/AltJIT/,+1d' "$PLIST"
          sed -i '' 's/<key>LDEntitlements<\/key>/<key>PortalJITSkip<\/key>/g' "$PLIST"

          # 5. Prepare Menu Header
          printf '@class PortalBrowserController;\n' > head.tmp
          cat head.tmp "$LMV" > "$LMV.new" && mv "$LMV.new" "$LMV"

          # 6. Swap Button & Add Controller Logic
          sed -i '' 's/enterModInstaller/openPortalLibrary/g' "$LMV"
          
          printf '\n@implementation LauncherMenuViewController (Portal)\n- (void)openPortalLibrary {\n    Class pbcClass = NSClassFromString(@"PortalBrowserController");\n    if (pbcClass) {\n        id pbc = [[pbcClass alloc] init];\n        id nav = [[UINavigationController alloc] initWithRootViewController:pbc];\n        [self presentViewController:nav animated:YES completion:nil];\n    }\n}\n@end\n' >> "$LMV"

          # 7. Update CMakeLists Source List
          sed -i '' 's/LauncherMenuViewController.m/LauncherMenuViewController.m PortalLibrary.m/g' "$CMAKE"

      - name: Build for iOS
        run: |
          cd Amethyst-iOS
          export PATH=/opt/homebrew/bin:$PATH
          export SLIMMED=1
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=2 BRANCH=main
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=2 TROLLSTORE_JIT_ENT=1 BRANCH=main

      - name: Upload Portal Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Portal-Remastered-IPA
          path: Amethyst-iOS/artifacts/
