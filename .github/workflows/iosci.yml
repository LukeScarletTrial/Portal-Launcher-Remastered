name: iOS CI

on: [push, workflow_dispatch]

jobs:
  build:
    name: iOS CI
    strategy:
      matrix:
        include:
          - platform: 2
            platform_name: ios

    runs-on: macos-14
    steps:
      - name: Remove work folders
        run: |
          rm -rf ./* || true
          rm -rf ./.??* || true
          
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Checkout repository submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          brew install gpatch
          brew install make
          brew install --cask zulu@8
          export JAVA_HOME=`/usr/libexec/java_home -v 1.8`
          brew install ldid

      - name: Patch files
        run: |
          gpatch ./Amethyst-iOS/Natives/MinecraftResourceDownloadTask.m MinecraftResourceDownloadTask.patch
          gpatch ./Amethyst-iOS/Natives/JavaLauncher.m JavaLauncher.patch
          gpatch ./Amethyst-iOS/Natives/CMakeLists.txt CMakeLists.patch

      - name: Portal Branding & UI Injection
        run: |
          PLIST_PATH="./Amethyst-iOS/Natives/Info.plist"
          LMV_PATH="./Amethyst-iOS/Natives/LauncherMenuViewController.m"

          # 1. Update Info.plist: Remove Startup JIT & Rebrand Display Name
          if [ -f "$PLIST_PATH" ]; then
            sed -i '' '/CFBundleDisplayName/{n;s/<string>.*<\/string>/<string>Portal<\/string>/;}' "$PLIST_PATH"
            sed -i '' 's/org.angelauramc.amethyst/com.portalmc.portal/g' "$PLIST_PATH"
            # Disable the 'JIT Required' check for the initial app launch
            sed -i '' '/AltJIT/,+1d' "$PLIST_PATH"
            sed -i '' 's/<key>LDEntitlements<\/key>/<key>PortalJITSkip<\/key>/g' "$PLIST_PATH"
            echo "✅ JIT Requirement Bypassed & App Branded"
          fi
          
          # 2. Inject WebKit Header at the top of LauncherMenuViewController.m
          if [ -f "$LMV_PATH" ]; then
            sed -i '' '1i\
            #import <WebKit/WebKit.h>' "$LMV_PATH"
          fi

          # 3. Inject the Portal Library Controller (Browser + Installer logic)
          cat <<EOF >> "$LMV_PATH"

@interface PortalBrowserController : UIViewController <WKNavigationDelegate, WKDownloadDelegate>
@property (nonatomic, strong) WKWebView *webView;
@end

@implementation PortalBrowserController
- (void)viewDidLoad {
    [super viewDidLoad];
    self.title = @"Portal Library";
    WKWebViewConfiguration *config = [[WKWebViewConfiguration alloc] init];
    self.webView = [[WKWebView alloc] initWithFrame:self.view.bounds configuration:config];
    self.webView.navigationDelegate = self;
    [self.view addSubview:self.webView];
    [self.webView loadRequest:[NSURLRequest requestWithURL:[NSURL URLWithString:@"https://modrinth.com"]]];
    
    UIBarButtonItem *done = [[UIBarButtonItem alloc] initWithTitle:@"Done" style:UIBarButtonItemStyleDone target:self action:@selector(dismiss)];
    self.navigationItem.leftBarButtonItem = done;
}

- (void)webView:(WKWebView *)webView navigationAction:(WKNavigationAction *)navigationAction didBecomeDownload:(WKDownload *)download {
    download.delegate = self;
}

- (void)download:(WKDownload *)download decideDestinationUsingResponse:(NSURLResponse *)response suggestedFilename:(NSString *)suggestedFilename completionHandler:(void (^)(NSURL * _Nullable destinationURL))completionHandler {
    NSString *docs = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject];
    NSString *modsPath = [docs stringByAppendingPathComponent:@"minecraft/mods"];
    [[NSFileManager defaultManager] createDirectoryAtPath:modsPath withIntermediateDirectories:YES attributes:nil error:nil];
    NSURL *destination = [NSURL fileURLWithPath:[modsPath stringByAppendingPathComponent:suggestedFilename]];
    completionHandler(destination);
    printf("Portal: Saving %s to mods folder\n", [suggestedFilename UTF8String]);
}

- (void)dismiss { [self dismissViewControllerAnimated:YES completion:nil]; }
@end
EOF

          # 4. Link the Sidebar Button to the Portal Library
          if [ -f "$LMV_PATH" ]; then
            sed -i '' 's/enterModInstaller/openPortalLibrary/g' "$LMV_PATH"
            sed -i '' '/@implementation LauncherMenuViewController/a \
            - (void)openPortalLibrary { \
              PortalBrowserController *pbc = [[PortalBrowserController alloc] init]; \
              UINavigationController *nav = [[UINavigationController alloc] initWithRootViewController:pbc]; \
              [self presentViewController:nav animated:YES completion:nil]; \
            }' "$LMV_PATH"
          fi

      - name: Build for ${{ matrix.platform_name }}
        run: |
          cd Amethyst-iOS
          export PATH=/opt/homebrew/bin:$PATH
          export SLIMMED=1
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} BRANCH=main VERBOSE=1
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1 BRANCH=main VERBOSE=1

      - name: Upload Portal IPA
        uses: actions/upload-artifact@main
        with:
          name: PortalMC-${{ matrix.platform_name }}.ipa
          path: Amethyst-iOS/artifacts/*.ipa

      - name: Upload Portal TrollStore TIPA
        uses: actions/upload-artifact@main
        with:
          name: PortalMC-${{ matrix.platform_name }}-trollstore.tipa
          path: Amethyst-iOS/artifacts/*.tipa
