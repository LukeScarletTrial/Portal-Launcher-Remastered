- name: Portal Branding & UI Injection
        run: |
          # 1. Change the name the user sees on the Home Screen
          # We edit the Info.plist but KEEP the folder names as Amethyst
          PLIST_PATH="./Amethyst-iOS/Natives/Info.plist"
          if [ -f "$PLIST_PATH" ]; then
            sed -i '' 's/<string>Amethyst<\/string>/<string>Portal<\/string>/g' "$PLIST_PATH"
            sed -i '' 's/org.angelauramc.amethyst/com.portalmc.portal/g' "$PLIST_PATH"
            echo "✅ Display Name changed to Portal"
          fi
          
          # 2. Inject the Portal Library button into the Sidebar
          LMV_PATH="./Amethyst-iOS/Natives/LauncherMenuViewController.m"
          if [ -f "$LMV_PATH" ]; then
            # Adds the button after the preferences item
            sed -i '' '/LauncherPreferencesViewController.class/a \
            [LauncherMenuCustomItem vcClass:LauncherNewsViewController.class],' "$LMV_PATH"
            
            # Change any "Amethyst" text in the UI to "Portal"
            sed -i '' 's/Amethyst/Portal/g' "$LMV_PATH"
            echo "✅ Menu Button Injected"
          fi

          # 3. Fix the Makefile to ensure it doesn't look for the wrong thing
          # We revert any previous AngelAuraPortal changes back to AngelAuraAmethyst
          # so the build actually finishes.
          MAKE_PATH="./Amethyst-iOS/Makefile"
          if [ -f "$MAKE_PATH" ]; then
            sed -i '' 's/AngelAuraPortal/AngelAuraAmethyst/g' "$MAKE_PATH"
          fi
