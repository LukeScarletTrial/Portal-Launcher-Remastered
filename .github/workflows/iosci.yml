name: iOS CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: iOS CI
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - platform: 2
            platform_name: ios

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          brew install gpatch make ldid
          brew install --cask zulu@8
          echo "JAVA_HOME=$(/usr/libexec/java_home -v 1.8)" >> $GITHUB_ENV

      - name: Portal Component & Header Repair
        run: |
          # Define Paths
          PLIST_PATH="./Amethyst-iOS/Natives/Info.plist"
          LMV_PATH="./Amethyst-iOS/Natives/LauncherMenuViewController.m"
          CMAKE_PATH="./Amethyst-iOS/Natives/CMakeLists.txt"
          JAVA_LAUNCHER="./Amethyst-iOS/Natives/JavaLauncher.m"

          # 1. Fix the JavaLauncher.m errors (Repair missing Mach headers causing Error 1)
          if [ -f "$JAVA_LAUNCHER" ]; then
            sed -i '' '1i\'$'\n''#import <mach/mach.h>'$'\n''#import <mach/task.h>'$'\n' "$JAVA_LAUNCHER"
            echo "✅ Repaired JavaLauncher headers"
          fi

          # 2. Move your code into the submodule
          if [ -f "PortalLibrary.m" ]; then
            cp PortalLibrary.m ./Amethyst-iOS/Natives/PortalLibrary.m
            echo "✅ PortalLibrary.m moved to Natives"
          else
            echo "❌ PortalLibrary.m NOT FOUND in main directory!"
            exit 1
          fi
          
          # 3. Rebrand & Bypass JIT (Removes AltJIT requirement for app launch)
          if [ -f "$PLIST_PATH" ]; then
            sed -i '' '/CFBundleDisplayName/{n;s/<string>.*<\/string>/<string>Portal<\/string>/;}' "$PLIST_PATH"
            sed -i '' 's/org.angelauramc.amethyst/com.portalmc.portal/g' "$PLIST_PATH"
            sed -i '' '/AltJIT/,+1d' "$PLIST_PATH"
            sed -i '' 's/<key>LDEntitlements<\/key>/<key>PortalJITSkip<\/key>/g' "$PLIST_PATH"
            echo "✅ Info.plist rebranded and JIT bypassed"
          fi

          # 4. Import the file into the Menu
          sed -i '' '1i\'$'\n''#import "PortalLibrary.m"'$'\n' "$LMV_PATH"

          # 5. Swap button and add launch logic
          sed -i '' 's/enterModInstaller/openPortalLibrary/g' "$LMV_PATH"
          sed -i '' '/@implementation LauncherMenuViewController/a \
          - (void)openPortalLibrary { \
            PortalBrowserController *pbc = [[PortalBrowserController alloc] init]; \
            UINavigationController *nav = [[UINavigationController alloc] initWithRootViewController:pbc]; \
            [self presentViewController:nav animated:YES completion:nil]; \
          }' "$LMV_PATH"

          # 6. Tell CMake to compile the new file
          if [ -f "$CMAKE_PATH" ]; then
            sed -i '' 's/LauncherMenuViewController.m/LauncherMenuViewController.m PortalLibrary.m/g' "$CMAKE_PATH"
            echo "✅ CMakeLists updated to include PortalLibrary.m"
          fi

      - name: Build for iOS
        run: |
          cd Amethyst-iOS
          export PATH=/opt/homebrew/bin:$PATH
          export SLIMMED=1
          # Build standard IPA and TrollStore version
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=2 BRANCH=main
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=2 TROLLSTORE_JIT_ENT=1 BRANCH=main

      - name: Upload Portal Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Portal-Release-Build
          path: Amethyst-iOS/artifacts/
