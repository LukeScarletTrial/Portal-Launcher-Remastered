name: iOS CI

on: [push, workflow_dispatch]

jobs:
  build:
    name: iOS CI
    strategy:
      matrix:
        include:
          - platform: 2
            platform_name: ios

    runs-on: macos-14
    steps:
      - name: Remove work folders
        run: |
          rm -rf ./* || true
          rm -rf ./.??* || true
          
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Checkout repository submodules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          brew install gpatch
          brew install make
          brew install --cask zulu@8
          export JAVA_HOME=`/usr/libexec/java_home -v 1.8`
          brew install ldid

      - name: Patch files
        run: |
          gpatch ./Amethyst-iOS/Natives/MinecraftResourceDownloadTask.m MinecraftResourceDownloadTask.patch
          gpatch ./Amethyst-iOS/Natives/JavaLauncher.m JavaLauncher.patch
          gpatch ./Amethyst-iOS/Natives/CMakeLists.txt CMakeLists.patch

      - name: Portal Branding & UI Injection
        run: |
          # 1. Update Display Name and Bundle ID in Info.plist
          # Using -i '' for macOS sed compatibility
          sed -i '' 's/Amethyst/Portal/g' ./Amethyst-iOS/Natives/Info.plist
          sed -i '' 's/org.angelauramc.amethyst/com.portalmc.portal/g' ./Amethyst-iOS/Natives/Info.plist
          
          # 2. Inject the Portal Library button into the Sidebar Menu
          # We target the line after execute_jar to add our new custom item
          sed -i '' '/launcher.menu.execute_jar/a \
          [self.options addObject:(id)[LauncherMenuCustomItem title:@"Portal Library" imageName:@"square.grid.2x2" action:^{ [contentNavigationController performSelector:@selector(enterModInstaller)]; }]];' ./Amethyst-iOS/PojavLauncher/LauncherMenuViewController.m

          # 3. Update internal UI strings to say "Portal"
          sed -i '' 's/Amethyst/Portal/g' ./Amethyst-iOS/PojavLauncher/LauncherMenuViewController.m

      - name: Build for ${{ matrix.platform_name }}
        run: |
          cd Amethyst-iOS
          export PATH=/opt/homebrew/bin:$PATH
          export SLIMMED=1
          if [ "${{ matrix.platform_name }}" == "ios" ]; then
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} BRANCH=main VERBOSE=1
            gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=${{ matrix.platform }} TROLLSTORE_JIT_ENT=1 BRANCH=main VERBOSE=1
          fi

      - name: Upload Portal IPA
        uses: actions/upload-artifact@main
        with:
          name: PortalMC-${{ matrix.platform_name }}.ipa
          path: Amethyst-iOS/artifacts/*.ipa

      - name: Upload Portal TrollStore TIPA
        uses: actions/upload-artifact@main
        with:
          name: PortalMC-${{ matrix.platform_name }}-trollstore.tipa
          path: Amethyst-iOS/artifacts/*.tipa
